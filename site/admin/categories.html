<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التصنيفات | أثير</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="../assets/css/atheer.css" />
</head>
<body class="admin-body font-sans antialiased">
  <div data-admin-shell></div>
  <main data-admin-page class="space-y-5 p-4 md:p-6">
    <section class="rounded-3xl border border-line bg-surface p-6 shadow-soft md:p-8">
      <div class="flex flex-wrap items-end justify-between gap-4">
        <div>
          <h1 class="text-2xl font-semibold text-ink">التصنيفات</h1>
          <p class="mt-2 max-w-2xl text-sm leading-7 text-muted">إدارة شجرة التصنيفات والسمات المرتبطة بكل فئة.</p>
        </div>
        <button type="button" class="btn-press h-9 rounded-xl bg-accent px-4 text-sm font-medium text-white">تصنيف جديد</button>
      </div>

      <div class="mt-6 overflow-x-auto rounded-2xl border border-line">
        <table class="w-full min-w-[640px] text-right text-sm">
          <thead class="bg-canvas text-muted">
            <tr>
              <th class="px-4 py-3 font-medium">التصنيف</th>
              <th class="px-4 py-3 font-medium">المعرّف</th>
              <th class="px-4 py-3 font-medium">المنتجات</th>
              <th class="px-4 py-3 font-medium">الحالة</th>
              <th class="px-4 py-3 font-medium">إجراء</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-t border-line">
              <td class="px-4 py-3">
                <div class="flex items-center gap-3">
                  <div class="size-10 shrink-0 overflow-hidden rounded-lg bg-canvas-muted"><img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=200&q=80" alt="" class="h-full w-full object-cover" /></div>
                  <span class="font-semibold text-ink">الأناقة اليومية</span>
                </div>
              </td>
              <td class="px-4 py-3 text-muted">everyday-elegance</td>
              <td class="px-4 py-3 tabular-nums">248</td>
              <td class="px-4 py-3"><span class="rounded-lg bg-accent-soft px-2.5 py-1 text-xs font-medium text-accent">نشط</span></td>
              <td class="px-4 py-3"><button type="button" class="btn-press rounded-lg px-3 py-1.5 text-sm text-accent hover:bg-accent-soft">تعديل</button></td>
            </tr>
            <tr class="border-t border-line">
              <td class="px-4 py-3">
                <div class="flex items-center gap-3">
                  <div class="size-10 shrink-0 overflow-hidden rounded-lg bg-canvas-muted"><img src="https://images.unsplash.com/photo-1558002038-1055907df827?auto=format&fit=crop&w=200&q=80" alt="" class="h-full w-full object-cover" /></div>
                  <span class="font-semibold text-ink">تقنية المنزل</span>
                </div>
              </td>
              <td class="px-4 py-3 text-muted">home-tech</td>
              <td class="px-4 py-3 tabular-nums">186</td>
              <td class="px-4 py-3"><span class="rounded-lg bg-accent-soft px-2.5 py-1 text-xs font-medium text-accent">نشط</span></td>
              <td class="px-4 py-3"><button type="button" class="btn-press rounded-lg px-3 py-1.5 text-sm text-accent hover:bg-accent-soft">تعديل</button></td>
            </tr>
            <tr class="border-t border-line">
              <td class="px-4 py-3">
                <div class="flex items-center gap-3">
                  <div class="size-10 shrink-0 overflow-hidden rounded-lg bg-canvas-muted"><img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348?auto=format&fit=crop&w=200&q=80" alt="" class="h-full w-full object-cover" /></div>
                  <span class="font-semibold text-ink">العناية الفاخرة</span>
                </div>
              </td>
              <td class="px-4 py-3 text-muted">luxury-care</td>
              <td class="px-4 py-3 tabular-nums">132</td>
              <td class="px-4 py-3"><span class="rounded-lg bg-accent-soft px-2.5 py-1 text-xs font-medium text-accent">نشط</span></td>
              <td class="px-4 py-3"><button type="button" class="btn-press rounded-lg px-3 py-1.5 text-sm text-accent hover:bg-accent-soft">تعديل</button></td>
            </tr>
            <tr class="border-t border-line">
              <td class="px-4 py-3">
                <div class="flex items-center gap-3">
                  <div class="size-10 shrink-0 overflow-hidden rounded-lg bg-canvas-muted"><img src="https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?auto=format&fit=crop&w=200&q=80" alt="" class="h-full w-full object-cover" /></div>
                  <span class="font-semibold text-ink">مساحة المعيشة</span>
                </div>
              </td>
              <td class="px-4 py-3 text-muted">living-space</td>
              <td class="px-4 py-3 tabular-nums">97</td>
              <td class="px-4 py-3"><span class="rounded-lg bg-accent-soft px-2.5 py-1 text-xs font-medium text-accent">نشط</span></td>
              <td class="px-4 py-3"><button type="button" class="btn-press rounded-lg px-3 py-1.5 text-sm text-accent hover:bg-accent-soft">تعديل</button></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="mt-6 rounded-2xl bg-canvas p-5 text-sm text-muted">
        الوحدة جاهزة للتوسع بالبيانات الحية والصلاحيات التفصيلية.
      </div>
    </section>
  </main>
  <script src="../assets/js/admin-shell.js"></script>
</body>
</html>
