<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سلة التسوق | أثير</title>
  <meta name="description" content="راجع منتجاتك في سلة أثير — شحن مجاني فوق 500 ر.س، إرجاع 14 يوم، ودفع آمن." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="assets/css/atheer.css" />
</head>
<body class="font-sans antialiased">
  <div data-site-header></div>

  <main class="page-enter pb-20">
    <!-- Breadcrumb -->
    <nav class="container-wide pt-6" aria-label="مسار التنقل">
      <ol class="flex flex-wrap items-center gap-2 text-sm text-muted">
        <li><a href="index.html" class="transition hover:text-ink">الرئيسية</a></li>
        <li aria-hidden="true" class="text-line">/</li>
        <li class="font-medium text-ink" aria-current="page">السلة</li>
      </ol>
    </nav>

    <div class="container-wide py-8 md:py-12">
      <div class="mb-6 space-y-4 md:mb-8">
        <h1 class="text-3xl font-semibold tracking-tight text-ink md:text-4xl">سلة التسوق</h1>
        <p class="max-w-2xl text-base leading-8 text-muted">راجع منتجاتك قبل إتمام الشراء — كل خطوة مصممة لتكون واضحة وآمنة.</p>
        <!-- Trust strip -->
        <div class="flex flex-wrap gap-3 pt-1">
          <span class="inline-flex items-center gap-2 rounded-xl border border-line bg-surface px-4 py-2.5 text-sm shadow-soft">
            <svg class="size-4 shrink-0 text-accent" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 18H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3.19M15 6h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-3.19"/><path d="M23 13v-2a2 2 0 0 0-2-2h-1"/><path d="M16 6V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><rect width="20" height="8" x="2" y="8" rx="2"/></svg>
            شحن مجاني فوق 500 ر.س
          </span>
          <span class="inline-flex items-center gap-2 rounded-xl border border-line bg-surface px-4 py-2.5 text-sm shadow-soft">
            <svg class="size-4 shrink-0 text-accent" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg>
            إرجاع 14 يوم
          </span>
          <span class="inline-flex items-center gap-2 rounded-xl border border-line bg-surface px-4 py-2.5 text-sm shadow-soft">
            <svg class="size-4 shrink-0 text-accent" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/></svg>
            دفع آمن
          </span>
        </div>
      </div>

      <div id="cart-root"></div>
    </div>
  </main>

  <div data-site-footer></div>
  <script src="assets/js/storefront.js"></script>
  <script>
    const FREE_SHIPPING_THRESHOLD = 500;
    const SHIPPING_COST = 25;
    let appliedCoupon = null;

    const RECOMMENDED = [
      { id: "rec1", name: "شمعة عطرية بإيقاع هادئ", brand: "نور", price: 185, image: "https://images.unsplash.com/photo-1602608584524-53e7739b8d4c?auto=format&fit=crop&w=600&q=80" },
      { id: "rec2", name: "حقيبة جلدية بتصميم مبسّط", brand: "أوريون", price: 620, image: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?auto=format&fit=crop&w=600&q=80" },
      { id: "rec3", name: "سماعات لاسلكية بعزل محيطي", brand: "سما", price: 449, image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=600&q=80" },
      { id: "rec4", name: "مزهرية سيراميك يدوية", brand: "مرسى", price: 290, image: "https://images.unsplash.com/photo-1578749556568-2d6aa7f3a3f9?auto=format&fit=crop&w=600&q=80" },
    ];

    function money(n) {
      return new Intl.NumberFormat("ar-SA", { style: "currency", currency: "SAR", maximumFractionDigits: 0 }).format(n);
    }

    function couponDiscount(subtotal) {
      if (appliedCoupon === "ATHIR10") return Math.round(subtotal * 0.1);
      return 0;
    }

    function shippingCost(subtotal) {
      return subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_COST;
    }

    function bindQtyControls(root) {
      root.querySelectorAll("[data-inc]").forEach((btn) => {
        btn.onclick = () => {
          const items = AtheerCart.read();
          items[Number(btn.dataset.inc)].quantity += 1;
          AtheerCart.write(items);
          render();
        };
      });
      root.querySelectorAll("[data-dec]").forEach((btn) => {
        btn.onclick = () => {
          const items = AtheerCart.read();
          const i = Number(btn.dataset.dec);
          items[i].quantity = Math.max(1, items[i].quantity - 1);
          AtheerCart.write(items);
          render();
        };
      });
      root.querySelectorAll("[data-remove]").forEach((btn) => {
        btn.onclick = () => {
          const items = AtheerCart.read();
          items.splice(Number(btn.dataset.remove), 1);
          AtheerCart.write(items);
          render();
        };
      });
      root.querySelectorAll("[data-wishlist]").forEach((btn) => {
        btn.onclick = () => {
          window.location.href = "account.html#wishlist";
        };
      });
      root.querySelectorAll("[data-rec-add]").forEach((btn) => {
        btn.onclick = () => {
          AtheerCart.add({
            id: btn.dataset.id,
            name: btn.dataset.name,
            brand: btn.dataset.brand,
            price: Number(btn.dataset.price),
            image: btn.dataset.image,
            quantity: 1,
          });
          render();
        };
      });
    }

    function recommendedHTML() {
      return `
        <section class="mt-16 border-t border-line pt-12 md:mt-20 md:pt-16" aria-labelledby="rec-heading">
          <div class="mb-6 space-y-2">
            <p class="text-sm font-medium text-accent">قد يعجبك أيضاً</p>
            <h2 id="rec-heading" class="text-xl font-semibold text-ink md:text-2xl">أكمل تجربتك باختيارات مختارة</h2>
          </div>
          <div class="grid grid-cols-2 gap-4 md:grid-cols-4 lg:gap-5">
            ${RECOMMENDED.map((p) => `
              <article class="group flex flex-col overflow-hidden rounded-2xl border border-line bg-surface shadow-soft transition duration-300 hover:-translate-y-1 hover:shadow-lift">
                <a href="product.html" class="relative aspect-square overflow-hidden bg-canvas-muted">
                  <img src="${p.image}" alt="${p.name}" class="h-full w-full object-cover transition duration-500 group-hover:scale-[1.03]" />
                </a>
                <div class="flex flex-1 flex-col gap-2 p-4">
                  <p class="text-xs text-muted">${p.brand}</p>
                  <a href="product.html" class="line-clamp-2 text-sm font-medium leading-6 text-ink transition hover:text-accent">${p.name}</a>
                  <p class="text-sm font-semibold text-ink">${money(p.price)}</p>
                  <button type="button" data-rec-add data-id="${p.id}" data-name="${p.name}" data-brand="${p.brand}" data-price="${p.price}" data-image="${p.image}" class="btn-press mt-auto inline-flex h-10 items-center justify-center rounded-xl bg-accent text-sm font-medium text-white transition hover:bg-[#0d4f4a]">أضف للسلة</button>
                </div>
              </article>
            `).join("")}
          </div>
        </section>`;
    }

    function render() {
      const items = AtheerCart.read();
      const root = document.getElementById("cart-root");

      if (!items.length) {
        root.innerHTML = `
          <div class="flex min-h-[45vh] flex-col items-center justify-center gap-6 rounded-3xl border border-line bg-surface px-6 py-16 text-center shadow-soft md:px-12">
            <div class="flex size-24 items-center justify-center rounded-3xl bg-accent-soft text-accent shadow-soft" aria-hidden="true">
              <svg class="size-12" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            </div>
            <div class="max-w-md space-y-2">
              <h2 class="text-2xl font-semibold text-ink">سلتك فارغة حالياً</h2>
              <p class="text-base leading-8 text-muted">لم تضف أي منتجات بعد. اكتشف مجموعاتنا المختارة وابدأ ببناء سلة تناسب ذوقك.</p>
            </div>
            <div class="flex flex-wrap justify-center gap-3">
              <a href="index.html" class="btn-press inline-flex h-12 items-center rounded-xl bg-accent px-6 font-medium text-white shadow-[0_10px_24px_rgba(15,92,87,0.25)] transition hover:bg-[#0d4f4a]">متابعة التسوق</a>
              <a href="collections.html" class="btn-press inline-flex h-12 items-center rounded-xl border border-line bg-surface px-6 font-medium transition hover:border-accent/30 hover:bg-accent-soft">استكشف المجموعات</a>
            </div>
          </div>`;
        return;
      }

      const subtotal = items.reduce((s, i) => s + i.price * i.quantity, 0);
      const discount = couponDiscount(subtotal);
      const shipping = shippingCost(subtotal);
      const total = subtotal - discount + shipping;
      const progress = Math.min(100, (subtotal / FREE_SHIPPING_THRESHOLD) * 100);
      const remaining = Math.max(0, FREE_SHIPPING_THRESHOLD - subtotal);

      root.innerHTML = `
        <div class="grid gap-8 lg:grid-cols-[1.45fr_0.85fr] lg:gap-10">
          <div class="space-y-5">
            ${items.map((item, index) => `
              <article class="grid gap-5 rounded-3xl border border-line bg-surface p-5 shadow-soft sm:grid-cols-[140px_1fr] md:p-6">
                <a href="product.html" class="relative aspect-square overflow-hidden rounded-2xl bg-canvas-muted">
                  <img src="${item.image}" alt="${item.name}" class="h-full w-full object-cover transition hover:scale-[1.02]" />
                </a>
                <div class="flex min-w-0 flex-col gap-3 sm:flex-row sm:justify-between">
                  <div class="min-w-0 space-y-2">
                    <p class="text-xs font-medium text-accent">${item.brand || ""}</p>
                    <a href="product.html" class="block text-base font-semibold leading-7 text-ink transition hover:text-accent">${item.name}</a>
                    <p class="text-sm text-muted">${[item.color, item.size].filter(Boolean).join(" · ") || "الخيار الافتراضي"}</p>
                    <p class="text-sm text-muted">سعر الوحدة: <span class="font-medium text-ink">${money(item.price)}</span></p>
                    <div class="inline-flex h-11 items-center overflow-hidden rounded-xl border border-line bg-canvas">
                      <button type="button" data-dec="${index}" class="btn-press inline-flex size-11 items-center justify-center text-lg text-muted transition hover:bg-surface hover:text-ink" aria-label="تقليل الكمية">−</button>
                      <span class="min-w-12 border-x border-line px-3 text-center text-sm font-medium" aria-live="polite">${item.quantity}</span>
                      <button type="button" data-inc="${index}" class="btn-press inline-flex size-11 items-center justify-center text-lg text-muted transition hover:bg-surface hover:text-ink" aria-label="زيادة الكمية">+</button>
                    </div>
                    <div class="flex flex-wrap gap-4 pt-1">
                      <button type="button" data-remove="${index}" class="inline-flex items-center gap-1.5 text-sm text-danger transition hover:underline">
                        <svg class="size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        حذف
                      </button>
                      <button type="button" data-wishlist="${index}" class="inline-flex items-center gap-1.5 text-sm text-muted transition hover:text-accent">
                        <svg class="size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                        انقل للمفضلة
                      </button>
                    </div>
                  </div>
                  <div class="shrink-0 text-left sm:text-left">
                    <p class="text-lg font-semibold text-ink">${money(item.price * item.quantity)}</p>
                  </div>
                </div>
              </article>
            `).join("")}
          </div>

          <aside class="h-fit space-y-5 lg:sticky lg:top-24">
            ${remaining > 0 ? `
              <div class="rounded-3xl border border-line bg-surface p-5 shadow-soft">
                <div class="mb-2 flex items-center justify-between text-sm">
                  <span class="font-medium text-ink">الشحن المجاني</span>
                  <span class="text-muted">${money(remaining)} متبقية</span>
                </div>
                <div class="h-2 overflow-hidden rounded-full bg-canvas-muted" role="progressbar" aria-valuenow="${Math.round(progress)}" aria-valuemin="0" aria-valuemax="100" aria-label="التقدم نحو الشحن المجاني">
                  <div class="h-full rounded-full bg-accent transition-all duration-500" style="width:${progress}%"></div>
                </div>
                <p class="mt-2 text-xs leading-6 text-muted">أضف منتجات بقيمة ${money(remaining)} للحصول على شحن مجاني.</p>
              </div>
            ` : `
              <div class="flex items-center gap-3 rounded-3xl border border-accent/20 bg-accent-soft px-5 py-4 text-sm font-medium text-accent shadow-soft">
                <svg class="size-5 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m22 4-10 10-3-3"/></svg>
                مبروك! حصلت على شحن مجاني
              </div>
            `}

            <div class="rounded-3xl border border-line bg-surface p-6 shadow-soft">
              <h2 class="mb-5 text-lg font-semibold text-ink">ملخص الطلب</h2>

              <div class="mb-5 space-y-2">
                <label for="coupon" class="text-sm font-medium text-ink">رمز الخصم</label>
                <div class="flex gap-2">
                  <input id="coupon" type="text" placeholder="مثال: ATHIR10" value="${appliedCoupon || ""}" class="h-11 min-w-0 flex-1 rounded-xl border border-line bg-canvas px-4 text-sm transition focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent/20" />
                  <button type="button" id="apply-coupon" class="btn-press shrink-0 rounded-xl border border-line bg-surface px-4 text-sm font-medium transition hover:border-accent/30 hover:bg-accent-soft hover:text-accent">تطبيق</button>
                </div>
                ${appliedCoupon ? `<p class="text-xs text-success">تم تطبيق الخصم (${appliedCoupon})</p>` : ""}
              </div>

              <div class="space-y-3 text-sm">
                <div class="flex justify-between"><span class="text-muted">المجموع الفرعي</span><span class="font-medium">${money(subtotal)}</span></div>
                ${discount ? `<div class="flex justify-between text-success"><span>خصم (${appliedCoupon})</span><span>−${money(discount)}</span></div>` : ""}
                <div class="flex justify-between"><span class="text-muted">الشحن</span><span class="font-medium">${shipping ? money(shipping) : "مجاني"}</span></div>
                <div class="flex justify-between border-t border-line pt-3 text-base font-semibold text-ink">
                  <span>الإجمالي</span>
                  <span>${money(total)}</span>
                </div>
                <p class="text-xs text-muted">شامل الضريبة</p>
              </div>

              <a href="checkout.html" class="btn-press mt-6 flex h-14 w-full items-center justify-center rounded-xl bg-accent font-medium text-white shadow-[0_10px_24px_rgba(15,92,87,0.25)] transition hover:bg-[#0d4f4a]">إتمام الشراء</a>
              <a href="index.html" class="mt-3 flex h-12 w-full items-center justify-center rounded-xl border border-line text-sm font-medium transition hover:border-accent/30 hover:bg-accent-soft">متابعة التسوق</a>
            </div>
          </aside>
        </div>
        ${recommendedHTML()}`;

      bindQtyControls(root);

      const applyBtn = document.getElementById("apply-coupon");
      const couponInput = document.getElementById("coupon");
      if (applyBtn && couponInput) {
        applyBtn.onclick = () => {
          const code = couponInput.value.trim().toUpperCase();
          appliedCoupon = code === "ATHIR10" ? code : null;
          render();
        };
      }
    }

    document.addEventListener("DOMContentLoaded", () => setTimeout(render, 0));
  </script>
</body>
</html>
